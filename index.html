<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintonic</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png" class="logo">
</header>

<section class="hero">
  <h2>Get the Right Loan, Faster</h2>
  <p>Apply, refer & earn, or partner with us — all in one place.</p>

  <button id="openBtn">Refer & Earn</button>
</section>

<!-- POPUP -->
<div id="popupForm" class="popup">
  <div class="popup-content">

    <span class="close" id="closeBtn">&times;</span>

    <h2>Become a Referral Partner</h2>

    <form id="referralForm">

      <input type="text" id="name" placeholder="Full Name" required>
      <input type="tel" id="phone" placeholder="Mobile Number" required>
      <input type="email" id="email" placeholder="Email Address" required>

      <div class="terms-box">
        <ul>
          <li>Refer genuine clients</li>
          <li>Fintonic handles processing</li>
          <li>Commission after disbursement</li>
          <li>Approval depends on eligibility</li>
        </ul>
      </div>

      <label class="checkbox">
        <input type="checkbox" id="agree" required>
        <span>I confirm details are accurate</span>
      </label>

      <button type="submit" id="submitBtn">
        <span id="btnText">Submit</span>
        <span id="loader" class="loader"></span>
      </button>

    </form>

    <div id="successBox" class="success-box">
      <div class="success-icon">✔</div>
      <h3>You're Registered!</h3>
      <p id="successMsg"></p>
      <button id="closeSuccess">Close</button>
    </div>

    <div id="errorBox" class="error-box">
      <p id="errorMsg"></p>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
